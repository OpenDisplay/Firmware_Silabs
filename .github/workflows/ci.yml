name: Firmware BG22 CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc-arm-none-eabi binutils-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib

      - name: Configure and build
        working-directory: ${{ github.workspace }}
        env:
          ARM_GCC_DIR: /usr
          NINJA_EXE_PATH: /usr/bin/ninja
          OD_GENERATE_GBL_OTA: "OFF"
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA:0:7}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export OPENDISPLAY_BUILD_ID="pr-${{ github.event.pull_request.number }}-${SHORT}"
          else
            export OPENDISPLAY_BUILD_ID="ci-${SHORT}"
          fi
          ./build-and-flash.sh --no-flash --no-artifacts --no-ota-image

      - name: Size summary
        env:
          ARM_GCC_DIR: /usr
        run: arm-none-eabi-size --format=berkeley cmake_gcc/build/base/opendisplay-bg22.out

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendisplay-bg22-${{ github.run_id }}
          path: |
            cmake_gcc/build/base/opendisplay-bg22.s37
            cmake_gcc/build/base/opendisplay-bg22.hex
          if-no-files-found: error
